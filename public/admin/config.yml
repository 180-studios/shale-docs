backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home (Landing Page)
        file: src/content/docs/index.mdx
        fields:
          - { name: title, label: Title, widget: string }
          - { name: description, label: Description, widget: string, required: false }
          - { name: body, label: Content, widget: markdown }

  - name: docs
    label: Documentation
    label_singular: Page
    folder: src/content/docs
    create: true
    delete: true
    nested:
      depth: 3
    fields:
      - { name: title, label: Title, widget: string }
      - { name: description, label: Description, widget: string, required: false }
      - { name: body, label: Content, widget: markdown }
